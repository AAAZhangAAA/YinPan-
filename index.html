<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="影视网盘资源与插件工具分享站，精选电影、电视剧、动漫、综艺与实用插件。" />
  <title>影盘集 · 影视与插件资源分享</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- 顶部导航 -->
  <header class="site-header">
    <div class="header-inner">
      <button class="icon-btn menu-toggle" id="menuToggle" aria-label="打开分类菜单" title="分类">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>

      <a class="brand" href="#/" aria-label="返回首页">
        <span class="brand-mark">影</span>
        <span class="brand-text">影盘集</span>
      </a>

      <form class="search-form" id="searchForm" role="search">
        <svg class="search-ico" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="search" id="searchInput" class="search-input" placeholder="搜索电影、剧集、插件…" autocomplete="off" />
        <button type="submit" class="search-go">搜索</button>
      </form>

      <button class="icon-btn theme-toggle" id="themeToggle" aria-label="切换深色模式" title="深色模式">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" fill="currentColor"/></svg>
      </button>
    </div>
  </header>

  <div class="layout">
    <!-- 侧边栏分类导航 -->
    <aside class="sidebar" id="sidebar" aria-label="分类导航">
      <div class="sidebar-head">
        <span>分类导航</span>
        <button class="icon-btn sidebar-close" id="sidebarClose" aria-label="关闭菜单" title="关闭">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <nav class="cat-nav" id="catNav"><!-- 由 app.js 注入 --></nav>
    </aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- 主内容区 -->
    <main class="content" id="content"><!-- 由 app.js 注入 --></main>
  </div>

  <footer class="site-footer">
    <p>影盘集 · 影视网盘与插件资源分享 · 资源版权归原作者所有，仅供学习交流</p>
    <p class="muted">本站资源由站长手动整理，链接失效请反馈。请勿用于商业用途。</p>
  </footer>

  <!-- 提示条（复制等反馈） -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
